name: CI

on:
  push:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install clippy-sarif & sarif-fmt
        uses: taiki-e/install-action@v2
        with:
          tool: clippy-sarif,sarif-fmt

      - name: Run clippy
        run: >
          cargo clippy --all-features --message-format=json
          | clippy-sarif | tee rust-clippy-results.sarif | sarif-fmt
        continue-on-error: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: rust-clippy-results.sarif
          wait-for-processing: true

  build:
    name: Build (${{ matrix.target }})
    needs: clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: kodik
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: kodik.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodik-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          if-no-files-found: error

  source:
    name: Source archive
    needs: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        run: git archive --format=tar.gz --prefix=kodik-src/ HEAD -o kodik-src.tar.gz

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodik-source
          path: kodik-src.tar.gz
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [build, source]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from kodik/Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' kodik/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            artifacts/kodik-x86_64-unknown-linux-gnu/kodik
            artifacts/kodik-x86_64-pc-windows-msvc/kodik.exe
            artifacts/kodik-source/kodik-src.tar.gz

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish kodik-shiki
        run: cargo publish -p kodik-shiki --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish kodik-utils
        run: cargo publish -p kodik-utils --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish kodik-parser
        run: cargo publish -p kodik-parser --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish kodik
        run: cargo publish -p kodik --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
