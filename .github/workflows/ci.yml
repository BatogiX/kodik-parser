name: CI

on:
  push:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always
  KODIK_TOKEN: ${{ secrets.KODIK_TOKEN }}

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install clippy-sarif & sarif-fmt
        uses: taiki-e/install-action@v2
        with:
          tool: clippy-sarif,sarif-fmt

      - name: Run clippy
        run: >
          cargo clippy --all-features --message-format=json
          | clippy-sarif | tee rust-clippy-results.sarif | sarif-fmt
        continue-on-error: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: rust-clippy-results.sarif
          wait-for-processing: true

  version-check:
    name: Version Check
    needs: clippy
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check if version tag exists
        id: check
        run: |
          VERSION=$(grep '^version' kodik/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="v$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if [ -z "$(git tag --list "$TAG")" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist — version is new."
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists — version unchanged."
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: [clippy, version-check]
    if: needs.version-check.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: kodik
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: kodik.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodik-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [build, version-check]
    if: needs.version-check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-check.outputs.tag }}
          name: ${{ needs.version-check.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            artifacts/kodik-x86_64-unknown-linux-gnu/kodik
            artifacts/kodik-x86_64-pc-windows-msvc/kodik.exe

  publish:
    name: Publish to crates.io
    needs: [release, version-check]
    if: needs.version-check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish kodik-shiki
        run: cargo publish -p kodik-shiki --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish kodik-utils
        run: cargo publish -p kodik-utils --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish kodik-parser
        run: cargo publish -p kodik-parser --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish kodik
        run: cargo publish -p kodik --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
