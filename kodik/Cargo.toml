[package]
name = "kodik"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/BatogiX/kodik-parser"
homepage = "https://github.com/BatogiX/kodik-parser"
documentation = "https://docs.rs/kodik-parser"
keywords = ["rust", "library", "kodik", "parser"]
categories = ["api-bindings"]
readme = "README.md"
description = "A Rust library for getting direct links to files from Kodik."

[dependencies]
directories = { version = "6", default-features = false }
serde_json = "1"
serde.workspace = true

[dependencies.kodik-parser]
path = "../kodik-parser"
features = ["blocking"]

[dependencies.ureq]
version = "3"
default-features = false
features = ["json","rustls"]

[profile.release]
lto = true
codegen-units = 1
strip = true

[lints]
workspace = true