[package]
name = "kodik-parser"
version = "2.1.0"
edition = "2024"
description = "A Rust library for getting direct links to files from Kodik."
license = "MIT OR Apache-2.0"
repository = "https://github.com/BatogiX/kodik-parser"
homepage = "https://github.com/BatogiX/kodik-parser"
documentation = "https://docs.rs/kodik-parser"
keywords = ["rust", "library", "kodik", "parser"]
categories = ["api-bindings"]
readme = "README.md"

[features]
default = []

[dependencies]
kodik-utils = { path = "../kodik-utils" }

log.workspace = true
serde = { workspace = true, features = ["rc"] }
tokio.workspace = true
reqwest.workspace = true
base64.workspace = true
regex.workspace = true

arc-swap = { version = "1.9.0", default-features = false }

[dev-dependencies]
serde_json.workspace = true

[lints]
workspace = true
