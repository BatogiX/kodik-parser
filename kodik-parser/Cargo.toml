[package]
name = "kodik-parser"
version = "2.1.0"
edition = "2024"
description = "A Rust library for getting direct links to files from Kodik."
license = "MIT OR Apache-2.0"
repository = "https://github.com/BatogiX/kodik-parser"
homepage = "https://github.com/BatogiX/kodik-parser"
documentation = "https://docs.rs/kodik-parser"
keywords = ["rust", "library", "kodik", "parser"]
categories = ["api-bindings"]
readme = "README.md"

[features]
default = []

[dependencies]
log.workspace = true
serde.workspace = true
tokio.workspace = true
base64 = "0.22"
regex = "1"
ua_generator = { version = "0.5", default-features = false }
thiserror = { version = "2", default-features = false }
reqwest = { version = "0.13", default-features = false, features = ["json","rustls","form"] }

[profile.release]
workspace = true

[dev-dependencies]
serde_json.workspace = true

[lints]
workspace = true
