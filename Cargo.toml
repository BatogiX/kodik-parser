[package]
name = "kodik-parser"
version = "2.1.0"
edition = "2024"
description = "A Rust library for getting direct links to files from Kodik."
license = "MIT OR Apache-2.0"
repository = "https://github.com/BatogiX/kodik-parser"
homepage = "https://github.com/BatogiX/kodik-parser"
documentation = "https://docs.rs/kodik-parser"
keywords = ["rust", "library", "kodik", "parser"]
categories = ["api-bindings"]
readme = "README.md"

[features]
default = []
blocking = ["dep:ureq"]
async-impl = ["dep:reqwest"]
cli = ["blocking"]

[dependencies]
base64 = "0.22"
regex = "1"
serde = { version = "1", features = ["derive"] }
ua_generator = { version = "0.5", default-features = false }
thiserror = { version = "2", default-features = false }

# Everything else is optional..

[dependencies.reqwest]
version = "0.13"
default-features = false
optional = true
features = ["json","rustls","form"]

[dependencies.ureq]
version = "3"
default-features = false
optional = true
features = ["json","rustls"]

[[bin]]
name = "kodik"
path = "src/main.rs"
required-features = ["cli"]

[profile.release]
lto = true
codegen-units = 1
strip = true

[dev-dependencies]
serde_json = "1"
tokio = { version = "1", default-features = false, features = ["macros"] }
