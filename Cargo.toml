[workspace]
members = [
    "kodik",
    "kodik-parser",
]
resolver = "3"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
log = { version = "0.4.29", default-features = false }

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = "deny"
pedantic = "deny"
nursery = "deny"
cargo = "deny"
