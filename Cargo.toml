[workspace]
members = [
    "kodik",
    "kodik-parser",
]
resolver = "3"

[workspace.dependencies]
base64 = "0.22"
regex = "1"
serde = { version = "1", features = ["derive"] }
ua_generator = { version = "0.5", default-features = false }
thiserror = { version = "2", default-features = false }

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = "deny"
pedantic = "deny"
nursery = "deny"
cargo = "deny"